<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Session Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f14;--surface:#13161e;--card:#1a1d27;--card2:#1f2330;
  --border:#272b3a;--accent:#f0a500;--text:#e8eaf0;--muted:#6b7280;
  --merge:#7c5cbf;--merge-bg:#1e1a2e;--danger:#e05c2a;--green:#2ea87e;
  --r:10px;--r2:6px;
}
html{font-size:15px;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif}
body{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* ── HEADER ── */
header{
  flex-shrink:0;display:flex;align-items:center;gap:14px;
  padding:18px 28px;background:var(--surface);
  border-bottom:1px solid var(--border);z-index:100;
}
header .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.2rem;color:var(--accent);letter-spacing:-.5px}
header .logo span{color:var(--text)}
header nav{margin-left:auto;display:flex;gap:8px}

.main{display:grid;grid-template-columns:340px 1fr;flex:1;min-height:0;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{
  background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;height:100%;overflow:hidden;
}
.sidebar-header{flex-shrink:0;padding:16px 18px 12px;border-bottom:1px solid var(--border)}
.sidebar-header h2{font-family:'Syne',sans-serif;font-size:.95rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.filter-row{flex-shrink:0;display:flex;flex-direction:column;gap:8px;padding:14px 18px;border-bottom:1px solid var(--border)}

select,input[type=text]{
  width:100%;background:var(--card);border:1px solid var(--border);
  color:var(--text);padding:9px 12px;border-radius:var(--r2);font-size:.88rem;font-family:inherit;
  outline:none;transition:border-color .2s;
}
select:focus,input:focus{border-color:var(--accent)}
select option{background:var(--card)}

.chapter-list{
  flex-shrink:0;padding:10px 18px;display:flex;flex-direction:column;gap:6px;
  max-height:170px;overflow-y:auto;border-bottom:1px solid var(--border);
}
.chapter-list label{display:flex;align-items:center;gap:8px;font-size:.85rem;cursor:pointer;padding:5px 6px;border-radius:var(--r2);transition:background .15s}
.chapter-list label:hover{background:var(--card)}
.chapter-list input[type=checkbox]{accent-color:var(--accent);width:15px;height:15px}

.load-btn-row{flex-shrink:0;padding:10px 18px;border-bottom:1px solid var(--border)}

.module-pool{flex:1;min-height:0;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:5px}
.pool-label{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;padding:4px 6px;font-family:'DM Mono',monospace}

/* ── MODULE CARD ── */
.mod-card{
  flex-shrink:0;background:var(--card);border:1px solid var(--border);border-radius:var(--r2);
  padding:9px 12px;cursor:grab;user-select:none;
  display:flex;align-items:flex-start;gap:8px;
  transition:border-color .15s,box-shadow .15s;
}
.mod-card:hover{border-color:var(--accent);box-shadow:0 2px 12px #f0a50020}
.mod-card.dragging{opacity:.4;transform:scale(.97)}
.mod-card .drag-handle{color:var(--muted);font-size:.9rem;padding-top:1px;flex-shrink:0}
.mod-card .mod-info{flex:1;min-width:0}
.mod-card .mod-num{font-size:.7rem;color:var(--accent);font-family:'DM Mono',monospace;font-weight:500}
.mod-card .mod-head{font-size:.85rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.mod-card .mod-chapter{font-size:.72rem;color:var(--muted);margin-top:2px}
.mod-card .mod-actions{display:flex;gap:4px;flex-shrink:0}
.merge-badge{font-size:.65rem;background:var(--merge);color:#fff;border-radius:3px;padding:1px 5px;font-family:'DM Mono',monospace;display:inline-block;margin-right:4px}

/* ── BUILDER ── */
.builder{display:flex;flex-direction:column;height:100%;overflow:hidden;background:var(--bg)}
.builder-top{
  flex-shrink:0;padding:18px 24px 14px;border-bottom:1px solid var(--border);
  background:var(--surface);display:flex;align-items:center;gap:12px;flex-wrap:wrap;
}
.builder-top h1{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;flex:1}

.session-input-row{display:flex;gap:10px;align-items:center;width:100%}
.session-input-row input{flex:1}

/* category dropdown — same height as input but slightly narrower */
.session-input-row .cat-select{
  flex:0 0 220px;
  background:var(--card);border:1px solid var(--border);
  color:var(--text);padding:9px 12px;border-radius:var(--r2);
  font-size:.88rem;font-family:inherit;outline:none;
  transition:border-color .2s;
  /* red tint when nothing selected */
}
.session-input-row .cat-select.empty{border-color:var(--danger)}
.session-input-row .cat-select:focus{border-color:var(--accent)}
.session-input-row .cat-select option{background:var(--card)}

.merge-bar-wrap{flex-shrink:0;padding:0 16px}
.merge-select-zone{
  background:var(--merge-bg);border:1.5px dashed var(--merge);
  border-radius:var(--r);padding:12px 14px;
  display:none;flex-direction:column;gap:8px;margin:12px 0 0;
}
.merge-select-zone.open{display:flex}
.merge-select-zone h4{font-family:'Syne',sans-serif;font-size:.85rem;color:var(--merge)}
.merge-heading-input{background:var(--card);border:1px solid var(--merge);border-radius:var(--r2);padding:8px 12px;color:var(--text);font-size:.85rem;width:100%;outline:none;font-family:inherit}
.merge-heading-input:focus{border-color:#a07de0}

.drop-zone{flex:1;min-height:0;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px}
.drop-zone.empty-hint::after{
  content:'Drop modules here ↑';display:flex;align-items:center;justify-content:center;
  color:var(--muted);font-size:.9rem;border:2px dashed var(--border);border-radius:var(--r);
  padding:48px;margin:8px 0;opacity:.5;
}
.drop-zone.drag-active{border:2px dashed var(--accent);background:#f0a5000a;border-radius:var(--r)}

.session-card{
  flex-shrink:0;background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:10px 14px;display:flex;align-items:flex-start;gap:10px;
  transition:border-color .15s,box-shadow .15s;
}
.session-card:hover{border-color:#3a3f52;box-shadow:0 2px 10px #0006}
.session-card .pos{min-width:26px;height:26px;border-radius:50%;background:var(--border);color:var(--muted);display:flex;align-items:center;justify-content:center;font-size:.75rem;font-family:'DM Mono',monospace;flex-shrink:0}
.session-card.is-merge{border-color:var(--merge)}
.session-card.is-merge .pos{background:var(--merge);color:#fff}
.session-card .sc-info{flex:1;min-width:0}
.session-card .sc-heading{font-weight:500;font-size:.88rem;margin-bottom:2px}
.session-card .sc-meta{font-size:.75rem;color:var(--muted)}
.session-card .sc-actions{display:flex;gap:5px;flex-shrink:0}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r2);font-size:.85rem;font-weight:500;border:none;cursor:pointer;transition:all .15s;font-family:inherit}
.btn-primary{background:var(--accent);color:#000}.btn-primary:hover{background:#ffc234}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}.btn-ghost:hover{color:var(--text);border-color:#444}
.btn-danger{background:transparent;color:var(--danger);border:1px solid transparent}.btn-danger:hover{background:#e05c2a18;border-color:var(--danger)}
.btn-merge{background:var(--merge-bg);color:var(--merge);border:1px solid var(--merge)}.btn-merge:hover{background:#2a1f44}
.btn-sm{padding:5px 10px;font-size:.78rem;border-radius:4px}
.btn-icon{padding:5px 7px;border-radius:4px;background:transparent;border:1px solid var(--border);color:var(--muted);cursor:pointer;font-size:.85rem;transition:all .15s}
.btn-icon:hover{background:var(--card2);color:var(--text)}

/* ── SESSIONS PANEL ── */
.sessions-panel{position:fixed;right:0;top:0;height:100vh;width:380px;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s ease;z-index:200}
.sessions-panel.open{transform:translateX(0)}
.sessions-panel-header{flex-shrink:0;padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sessions-panel-header h2{font-family:'Syne',sans-serif;font-weight:700;font-size:1rem}
.sessions-list{flex:1;min-height:0;overflow-y:auto;padding:10px}
.session-item{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;transition:border-color .15s}
.session-item:hover{border-color:var(--accent)}
.session-item h3{font-size:.9rem;font-weight:600;margin-bottom:4px}
.session-item .si-meta{font-size:.78rem;color:var(--muted);display:flex;gap:10px;flex-wrap:wrap}
.session-item .si-actions{display:flex;gap:6px;margin-top:8px}

/* ── CONTENT PREVIEW MODAL ── */
.modal-backdrop{
  position:fixed;inset:0;background:#00000080;z-index:300;
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
.modal-backdrop.open{opacity:1;pointer-events:all}
.modal{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  width:min(700px,92vw);max-height:80vh;
  display:flex;flex-direction:column;
  box-shadow:0 24px 80px #000a;
  transform:translateY(16px);transition:transform .2s;
}
.modal-backdrop.open .modal{transform:translateY(0)}
.modal-header{flex-shrink:0;padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:12px}
.modal-header-info{flex:1;min-width:0}
.modal-header-info h2{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;margin-bottom:4px;line-height:1.3}
.modal-header-info .modal-meta{font-size:.78rem;color:var(--muted);display:flex;gap:12px;flex-wrap:wrap}
.modal-body{flex:1;min-height:0;overflow-y:auto;padding:20px 24px}
.content-render{font-size:.9rem;line-height:1.75;color:var(--text)}
.content-render h1,.content-render h2,.content-render h3{font-family:'Syne',sans-serif;font-weight:700;margin:1.2em 0 .5em;color:var(--accent)}
.content-render h1{font-size:1.2rem}.content-render h2{font-size:1.05rem}
.content-render h3{font-size:.95rem;color:#c8a0f0}
.content-render p{margin:.5em 0}
.content-render ul,.content-render ol{margin:.5em 0 .5em 1.4em}
.content-render li{margin:.25em 0}
.content-render strong{color:#fff;font-weight:600}
.content-render em{color:#c8d0e0;font-style:italic}
.content-render code{background:var(--card2);border:1px solid var(--border);border-radius:3px;padding:1px 5px;font-family:'DM Mono',monospace;font-size:.85em;color:#79c0ff}
.content-render pre{background:var(--card2);border:1px solid var(--border);border-radius:var(--r2);padding:14px;overflow-x:auto;margin:.75em 0}
.content-render pre code{background:none;border:none;padding:0}
.content-render blockquote{border-left:3px solid var(--accent);padding-left:14px;color:var(--muted);margin:.75em 0;font-style:italic}
.content-render hr{border:none;border-top:1px solid var(--border);margin:1.2em 0}
.content-render table{width:100%;border-collapse:collapse;margin:.75em 0;font-size:.88rem}
.content-render th{background:var(--card2);padding:8px 12px;text-align:left;border:1px solid var(--border);font-weight:600}
.content-render td{padding:8px 12px;border:1px solid var(--border)}
.content-render tr:nth-child(even) td{background:#ffffff05}
.content-empty{color:var(--muted);font-style:italic;text-align:center;padding:40px;font-size:.9rem}
.modal-footer{flex-shrink:0;padding:12px 20px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px}
.modal-nav{display:flex;gap:6px}
.modal-nav-info{font-size:.8rem;color:var(--muted);font-family:'DM Mono',monospace}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;right:24px;z-index:500;background:var(--card2);border:1px solid var(--border);border-radius:var(--r);padding:12px 18px;font-size:.88rem;display:flex;align-items:center;gap:10px;box-shadow:0 8px 32px #0008;transform:translateY(100px);opacity:0;transition:all .3s;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{border-color:var(--green)}.toast.error{border-color:var(--danger)}

::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#2a2f42;border-radius:3px}

.overlay{position:fixed;inset:0;background:#00000060;z-index:150;display:none}
.overlay.open{display:block}
.loading{color:var(--muted);font-size:.85rem;padding:16px;text-align:center}
</style>
</head>
<body>

<header>
  <div class="logo">Session<span>Builder</span></div>
  <nav>
    <button class="btn btn-ghost btn-sm" onclick="openSessions()">📋 Saved Sessions</button>
    <button class="btn btn-merge btn-sm" onclick="toggleMergeMode()" id="mergeToggleBtn">⊕ Merge Mode</button>
  </nav>
</header>

<div class="main">

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar">
    <div class="sidebar-header"><h2>Module Library</h2></div>

    <div class="filter-row">
      <select id="classSelect" onchange="onClassChange()">
        <option value="">Select Class…</option>
      </select>
    </div>

    <div class="chapter-list" id="chapterList">
      <div class="loading">← Select a class first</div>
    </div>

    <div class="load-btn-row">
      <button class="btn btn-ghost btn-sm" style="width:100%" onclick="loadModules()">Load Modules</button>
    </div>

    <div class="module-pool" id="modulePool">
      <div class="loading">Select class + chapters, then click Load Modules</div>
    </div>
  </aside>

  <!-- ── BUILDER ── -->
  <section class="builder">

    <div class="builder-top">
      <h1>🗂 Session Builder</h1>

      <!-- Session name + mandatory category dropdown -->
      <div class="session-input-row">
        <input type="text" id="sessionName" placeholder="Session name e.g. Ancient History Ch3"/>
        <select id="sessionDesc" class="cat-select empty" onchange="onCatChange(this)">
          <option value="">Select Category… *</option>
          <option>Medieval History</option>
          <option>Ancient History</option>
          <option>Modern History</option>
          <option>Karnataka History</option>
          <option>World History</option>
          <option>Economics</option>
          <option>Sociology</option>
          <option>Geography</option>
        </select>
      </div>

      <div style="display:flex;gap:8px;margin-left:auto">
        <button class="btn btn-ghost btn-sm" onclick="clearSession()">🗑 Clear</button>
        <button class="btn btn-primary btn-sm" onclick="saveSession()">💾 Save Session</button>
      </div>
    </div>

    <div class="merge-bar-wrap">
      <div id="mergeModeBar" class="merge-select-zone">
        <h4>⊕ Merge Mode — tick modules below, then click Merge</h4>
        <div style="display:flex;gap:8px;align-items:center">
          <input type="text" class="merge-heading-input" id="mergeHeadingInput" placeholder="Custom merged heading (optional)" style="flex:1"/>
          <button class="btn btn-merge btn-sm" onclick="applyMerge()">Merge Selected</button>
          <button class="btn btn-ghost btn-sm" onclick="cancelMerge()">Cancel</button>
        </div>
      </div>
    </div>

    <div class="drop-zone empty-hint" id="dropZone"
         ondragover="onDragOver(event)"
         ondragleave="onDragLeave(event)"
         ondrop="onDrop(event)">
    </div>

  </section>
</div>

<!-- ── CONTENT PREVIEW MODAL ── -->
<div class="modal-backdrop" id="previewBackdrop" onclick="closePreview(event)">
  <div class="modal" id="previewModal">
    <div class="modal-header">
      <div class="modal-header-info">
        <h2 id="previewTitle">Module Title</h2>
        <div class="modal-meta">
          <span id="previewNum"></span>
          <span id="previewChapter"></span>
          <span id="previewClass"></span>
        </div>
      </div>
      <button class="btn-icon" onclick="closePreviewDirect()" style="font-size:1rem">✕</button>
    </div>
    <div class="modal-body">
      <div class="content-render" id="previewContent"></div>
    </div>
    <div class="modal-footer">
      <div class="modal-nav">
        <button class="btn btn-ghost btn-sm" onclick="previewNav(-1)">← Prev</button>
        <button class="btn btn-ghost btn-sm" onclick="previewNav(1)">Next →</button>
      </div>
      <span class="modal-nav-info" id="previewNavInfo"></span>
      <button class="btn btn-primary btn-sm" onclick="addFromPreview()">+ Add to Session</button>
    </div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closeSessions()"></div>
<aside class="sessions-panel" id="sessionsPanel">
  <div class="sessions-panel-header">
    <h2>Saved Sessions</h2>
    <button class="btn btn-ghost btn-sm" onclick="closeSessions()">✕ Close</button>
  </div>
  <div class="sessions-list" id="sessionsList"><div class="loading">Loading…</div></div>
</aside>

<div class="toast" id="toast">
  <span id="toastIcon">✓</span>
  <span id="toastMsg"></span>
</div>

<script>
const API = 'https://web-production-a898.up.railway.app/api';

let allModules=[], sessionItems=[], dragging=null, draggingIdx=null;
let mergeMode=false, mergeSelected=new Set(), editingId=null;
let previewIdx=0, previewList=[];

// ── INIT ──
(async()=>{
  try{
    const r=await fetch(`${API}/classes`);
    const classes=await r.json();
    const sel=document.getElementById('classSelect');
    classes.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;sel.appendChild(o);});
  }catch(e){showToast('Cannot reach API.','error');}
})();

// remove red border once user picks a category
function onCatChange(sel){
  sel.classList.toggle('empty', sel.value==='');
}

// ── CLASS / CHAPTERS ──
async function onClassChange(){
  const cls=document.getElementById('classSelect').value;
  const list=document.getElementById('chapterList');
  list.innerHTML='<div class="loading">Loading…</div>';
  if(!cls){list.innerHTML='<div class="loading">← Select a class first</div>';return;}
  const r=await fetch(`${API}/chapters?class_name=${encodeURIComponent(cls)}`);
  const chapters=await r.json();
  list.innerHTML='';
  if(!chapters.length){list.innerHTML='<div class="loading">No chapters found</div>';return;}
  chapters.forEach(ch=>{
    const lbl=document.createElement('label');
    lbl.innerHTML=`<input type="checkbox" value="${ch.chapter_number}"/><span>${ch.chapter_title||('Chapter '+ch.chapter_number)}</span>`;
    list.appendChild(lbl);
  });
}

// ── LOAD MODULES ──
async function loadModules(){
  const cls=document.getElementById('classSelect').value;
  const checked=[...document.querySelectorAll('#chapterList input:checked')].map(i=>i.value);
  if(!cls||!checked.length){showToast('Select a class and at least one chapter','error');return;}
  const params=new URLSearchParams({class_name:cls});
  checked.forEach(c=>params.append('chapter_number',c));
  const pool=document.getElementById('modulePool');
  pool.innerHTML='<div class="loading">Loading…</div>';
  const r=await fetch(`${API}/modules?${params}`);
  allModules=await r.json();
  previewList=allModules;
  renderPool();
}

function renderPool(){
  const pool=document.getElementById('modulePool');
  pool.innerHTML='';
  const byChapter={};
  allModules.forEach(m=>{if(!byChapter[m.chapter_number])byChapter[m.chapter_number]=[];byChapter[m.chapter_number].push(m);});
  Object.entries(byChapter).forEach(([ch,mods])=>{
    const lbl=document.createElement('div');lbl.className='pool-label';lbl.textContent=`Chapter ${ch}`;pool.appendChild(lbl);
    mods.forEach(m=>pool.appendChild(makePoolCard(m)));
  });
  if(!allModules.length) pool.innerHTML='<div class="loading">No modules found</div>';
}

function makePoolCard(m){
  const div=document.createElement('div');
  div.className='mod-card';div.draggable=true;div.dataset.moduleId=m.module_id;
  div.innerHTML=`
    <span class="drag-handle">⠿</span>
    <div class="mod-info">
      <div class="mod-num">#${m.module_number}</div>
      <div class="mod-head" title="${esc(m.heading||'')}">${esc(m.heading||'(no heading)')}</div>
      <div class="mod-chapter">Ch.${m.chapter_number}</div>
    </div>
    <div class="mod-actions">
      <button class="btn-icon" title="Preview content" onclick="openPreview('${m.module_id}');event.stopPropagation()" style="font-size:.8rem">👁</button>
      <button class="btn-icon" title="Add to session"  onclick="addModuleToSession('${m.module_id}');event.stopPropagation()">+</button>
    </div>`;
  div.addEventListener('dragstart',e=>{dragging=m.module_id;draggingIdx=null;e.dataTransfer.effectAllowed='copy';div.classList.add('dragging');});
  div.addEventListener('dragend',()=>div.classList.remove('dragging'));
  return div;
}

// ── PREVIEW MODAL ──
function openPreview(module_id){
  const idx=previewList.findIndex(m=>m.module_id===module_id);
  if(idx===-1)return;
  previewIdx=idx;
  renderPreview();
  document.getElementById('previewBackdrop').classList.add('open');
}
function renderPreview(){
  const m=previewList[previewIdx];
  if(!m)return;
  document.getElementById('previewTitle').textContent=m.heading||'(no heading)';
  document.getElementById('previewNum').textContent=`#${m.module_number}`;
  document.getElementById('previewChapter').textContent=`Ch. ${m.chapter_number}${m.chapter_title?' — '+m.chapter_title:''}`;
  document.getElementById('previewClass').textContent=m.class_name||'';
  document.getElementById('previewNavInfo').textContent=`${previewIdx+1} / ${previewList.length}`;
  const contentEl=document.getElementById('previewContent');
  const raw=m.content||'';
  if(!raw.trim()){contentEl.innerHTML='<div class="content-empty">No content available for this module.</div>';}
  else{contentEl.innerHTML=renderMarkdown(raw);}
}
function closePreview(e){if(e.target===document.getElementById('previewBackdrop'))closePreviewDirect();}
function closePreviewDirect(){document.getElementById('previewBackdrop').classList.remove('open');}
function previewNav(dir){
  const next=previewIdx+dir;
  if(next<0||next>=previewList.length)return;
  previewIdx=next;
  document.querySelector('.modal-body').scrollTop=0;
  renderPreview();
}
function addFromPreview(){
  const m=previewList[previewIdx];if(!m)return;
  addModuleToSession(m.module_id);
  showToast(`Added "${m.heading||m.module_id}" to session`,'success');
}
document.addEventListener('keydown',e=>{
  if(!document.getElementById('previewBackdrop').classList.contains('open'))return;
  if(e.key==='Escape')closePreviewDirect();
  if(e.key==='ArrowLeft')previewNav(-1);
  if(e.key==='ArrowRight')previewNav(1);
});

function renderMarkdown(md){
  let html=md
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/_(.+?)_/g,'<em>$1</em>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/^---$/gm,'<hr>')
    .replace(/^&gt; (.+)$/gm,'<blockquote>$1</blockquote>')
    .replace(/^\s*[-*] (.+)$/gm,'<li>$1</li>')
    .replace(/^\s*\d+\. (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/g,m=>`<ul>${m}</ul>`)
    .split(/\n{2,}/).map(block=>{
      block=block.trim();if(!block)return'';
      if(/^<(h[1-3]|ul|ol|hr|blockquote|pre)/.test(block))return block;
      return`<p>${block.replace(/\n/g,'<br>')}</p>`;
    }).join('\n');
  return html;
}

// ── ADD MODULE ──
function addModuleToSession(module_id){
  const m=allModules.find(x=>x.module_id===module_id);if(!m)return;
  sessionItems.push({id:uid(),is_merge:false,module_ids:[module_id],heading:m.heading,content:m.content,modules:[m]});
  renderDropZone();
}

// ── DRAG & DROP ──
function onDragOver(e){e.preventDefault();e.currentTarget.classList.add('drag-active');e.dataTransfer.dropEffect='copy';}
function onDragLeave(e){e.currentTarget.classList.remove('drag-active');}
function onDrop(e){
  e.preventDefault();e.currentTarget.classList.remove('drag-active');
  if(dragging!==null&&draggingIdx===null){addModuleToSession(dragging);dragging=null;}
}
function startReorder(e,idx){draggingIdx=idx;dragging=null;e.dataTransfer.effectAllowed='move';}
function dropOnCard(e,targetIdx){
  e.preventDefault();e.stopPropagation();if(draggingIdx===null)return;
  const moved=sessionItems.splice(draggingIdx,1)[0];sessionItems.splice(targetIdx,0,moved);draggingIdx=null;renderDropZone();
}

// ── RENDER DROP ZONE ──
function renderDropZone(){
  const dz=document.getElementById('dropZone');
  dz.classList.toggle('empty-hint',sessionItems.length===0);
  dz.innerHTML='';
  sessionItems.forEach((item,idx)=>{
    const card=document.createElement('div');
    card.className='session-card'+(item.is_merge?' is-merge':'');
    card.draggable=true;
    card.ondragstart=e=>startReorder(e,idx);
    card.ondragover=e=>{e.preventDefault();card.style.borderColor='var(--accent)';};
    card.ondragleave=()=>card.style.borderColor='';
    card.ondrop=e=>{card.style.borderColor='';dropOnCard(e,idx);};
    const mergeCheck=mergeMode
      ?`<input type="checkbox" ${mergeSelected.has(idx)?'checked':''} onchange="toggleMergeSelect(${idx},this.checked)" style="accent-color:var(--merge);width:16px;height:16px;flex-shrink:0;margin-top:2px"/>`
      :'';
    card.innerHTML=`${mergeCheck}
      <div class="pos">${idx+1}</div>
      <div class="sc-info">
        <div class="sc-heading">${item.is_merge?'<span class="merge-badge">MERGED</span>':''}${esc(item.heading||'(no heading)')}</div>
        <div class="sc-meta">${item.is_merge?`${item.module_ids.length} modules merged`:`Module: ${item.module_ids.join(', ')}`}</div>
      </div>
      <div class="sc-actions">
        ${item.is_merge?`<button class="btn-icon btn-sm" title="Unmerge" onclick="unmergeItem(${idx})">↩</button>`:''}
        <button class="btn-icon btn-sm" onclick="moveItem(${idx},-1)">↑</button>
        <button class="btn-icon btn-sm" onclick="moveItem(${idx},1)">↓</button>
        <button class="btn-icon btn-sm btn-danger" onclick="removeItem(${idx})">✕</button>
      </div>`;
    dz.appendChild(card);
  });
}

function moveItem(idx,dir){const ni=idx+dir;if(ni<0||ni>=sessionItems.length)return;[sessionItems[idx],sessionItems[ni]]=[sessionItems[ni],sessionItems[idx]];renderDropZone();}
function removeItem(idx){sessionItems.splice(idx,1);renderDropZone();}
function unmergeItem(idx){
  const item=sessionItems[idx];
  const expanded=item.modules.map(m=>({id:uid(),is_merge:false,module_ids:[m.module_id],heading:m.heading,content:m.content,modules:[m]}));
  sessionItems.splice(idx,1,...expanded);renderDropZone();
}

// ── MERGE ──
function toggleMergeMode(){
  mergeMode=!mergeMode;mergeSelected.clear();
  document.getElementById('mergeModeBar').classList.toggle('open',mergeMode);
  document.getElementById('mergeToggleBtn').textContent=mergeMode?'✕ Exit Merge Mode':'⊕ Merge Mode';
  renderDropZone();
}
function cancelMerge(){
  mergeMode=false;mergeSelected.clear();
  document.getElementById('mergeModeBar').classList.remove('open');
  document.getElementById('mergeToggleBtn').textContent='⊕ Merge Mode';
  renderDropZone();
}
function toggleMergeSelect(idx,checked){if(checked)mergeSelected.add(idx);else mergeSelected.delete(idx);}
function applyMerge(){
  if(mergeSelected.size<2){showToast('Select at least 2 modules to merge','error');return;}
  const indices=[...mergeSelected].sort((a,b)=>a-b);
  const items=indices.map(i=>sessionItems[i]);
  const customHeading=document.getElementById('mergeHeadingInput').value.trim();
  const merged={
    id:uid(),is_merge:true,
    module_ids:items.flatMap(i=>i.module_ids),
    heading:customHeading||items.map(i=>i.heading).filter(Boolean).join(' + '),
    content:items.map(i=>(i.heading?`### ${i.heading}\n\n`:'')+i.content).join('\n\n---\n\n'),
    modules:items.flatMap(i=>i.modules)
  };
  sessionItems[indices[0]]=merged;
  for(let i=indices.length-1;i>=1;i--) sessionItems.splice(indices[i],1);
  mergeSelected.clear();document.getElementById('mergeHeadingInput').value='';
  showToast(`Merged ${items.length} modules`,'success');renderDropZone();
}

// ── SAVE SESSION ──
async function saveSession(){
  const name=document.getElementById('sessionName').value.trim();
  const category=document.getElementById('sessionDesc').value;

  if(!name){showToast('Enter a session name','error');return;}
  if(!category){showToast('Please select a category','error');document.getElementById('sessionDesc').classList.add('empty');return;}
  if(!sessionItems.length){showToast('Add at least one module','error');return;}

  const payload={
    session_name:name,
    description:category,
    class_name:document.getElementById('classSelect').value,
    items:sessionItems.map((item,i)=>({position:i,is_merge:item.is_merge,module_ids:item.module_ids,merged_heading:item.heading,merged_content:item.content}))
  };
  const method=editingId?'PUT':'POST';
  const url=editingId?`${API}/sessions/${editingId}`:`${API}/sessions`;
  const r=await fetch(url,{method,headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
  if(r.ok){showToast(`"${name}" saved!`,'success');editingId=(await r.json()).id;}
  else showToast('Save failed','error');
}

function clearSession(){
  sessionItems=[];editingId=null;
  document.getElementById('sessionName').value='';
  const cat=document.getElementById('sessionDesc');cat.value='';cat.classList.add('empty');
  renderDropZone();
}

// ── SESSIONS PANEL ──
async function openSessions(){
  document.getElementById('sessionsPanel').classList.add('open');
  document.getElementById('overlay').classList.add('open');
  const list=document.getElementById('sessionsList');
  list.innerHTML='<div class="loading">Loading…</div>';
  const r=await fetch(`${API}/sessions`);
  const sessions=await r.json();
  list.innerHTML='';
  if(!sessions.length){list.innerHTML='<div class="loading">No sessions yet</div>';return;}
  sessions.forEach(s=>{
    const div=document.createElement('div');div.className='session-item';
    div.innerHTML=`<h3>${esc(s.session_name)}</h3>
      <div class="si-meta">
        <span>${s.class_name||'—'}</span>
        ${s.description?`<span>📂 ${esc(s.description)}</span>`:''}
        <span>${s.items.length} items</span>
        <span>${new Date(s.created_at).toLocaleDateString()}</span>
      </div>
      <div class="si-actions">
        <button class="btn btn-ghost btn-sm" onclick="loadSession('${s.id}')">Load</button>
        <button class="btn btn-danger btn-sm" onclick="deleteSession('${s.id}',this)">Delete</button>
      </div>`;
    list.appendChild(div);
  });
}
function closeSessions(){document.getElementById('sessionsPanel').classList.remove('open');document.getElementById('overlay').classList.remove('open');}

async function loadSession(id){
  const r=await fetch(`${API}/sessions/${id}`);const s=await r.json();
  document.getElementById('sessionName').value=s.session_name;
  // restore category dropdown
  const cat=document.getElementById('sessionDesc');
  cat.value=s.description||'';
  cat.classList.toggle('empty',!s.description);
  editingId=s.id;
  const params=new URLSearchParams({class_name:s.class_name||''});
  const mods=s.class_name?await(await fetch(`${API}/modules?${params}`)).json():[];
  const modMap=Object.fromEntries(mods.map(m=>[m.module_id,m]));
  sessionItems=s.items.map(item=>{
    const modules=item.module_ids.map(id=>modMap[id]||{module_id:id,heading:id,content:''});
    return{id:uid(),is_merge:item.is_merge,module_ids:item.module_ids,heading:item.merged_heading,content:item.merged_content,modules};
  });
  renderDropZone();closeSessions();showToast(`Loaded "${s.session_name}"`,'success');
}
async function deleteSession(id,btn){
  if(!confirm('Delete this session?'))return;
  const r=await fetch(`${API}/sessions/${id}`,{method:'DELETE'});
  if(r.ok){btn.closest('.session-item').remove();showToast('Deleted','success');}
}

// ── UTILS ──
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function uid(){return Math.random().toString(36).slice(2)}
let toastTimer;
function showToast(msg,type='success'){
  const t=document.getElementById('toast'),m=document.getElementById('toastMsg'),i=document.getElementById('toastIcon');
  t.className='toast '+type;m.textContent=msg;i.textContent=type==='success'?'✓':'✕';
  t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),3000);
}
</script>
